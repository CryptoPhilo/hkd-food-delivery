# ============================================
# HKD 배포 하네스 - DB 마이그레이션 체크
# Prisma 스키마 변경 시 자동 검증
# ============================================

name: DB Migration Check

on:
  pull_request:
    paths:
      - 'architecture/backend/prisma/**'
      - 'architecture/frontend/prisma/**'

jobs:
  migration-check:
    name: 🗃️ DB 마이그레이션 검증
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 백엔드 Prisma 검증
        working-directory: architecture/backend
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
        run: |
          npm install
          npx prisma validate
          npx prisma generate
          echo "✅ 백엔드 Prisma 스키마 유효"

      - name: 마이그레이션 드리프트 체크
        continue-on-error: true
        working-directory: architecture/backend
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"
        run: |
          # 마이그레이션 파일과 스키마 일치 여부 확인
          if [ -d "prisma/migrations" ]; then
            npx prisma migrate diff \
              --from-migrations prisma/migrations \
              --to-schema-datamodel prisma/schema.prisma \
              --exit-code 2>/dev/null || {
                echo "⚠️ 스키마와 마이그레이션 차이 감지 (신규 마이그레이션 파일 추가 시 정상)"
              }
          fi
          echo "✅ 마이그레이션 체크 완료"

      - name: PR 코멘트
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **DB 마이그레이션 경고**\n\nPrisma 스키마가 변경되었지만 마이그레이션 파일이 누락되었습니다.\n\n```bash\ncd architecture/backend\nnpx prisma migrate dev --name <migration_name>\n```'
            })
