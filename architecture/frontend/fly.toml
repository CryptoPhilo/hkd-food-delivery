app = 'hkd-frontend'
primary_region = 'nrt'

[build]

[env]
  BACKEND_URL = "https://api.hankyeong.xyz"
  NEXT_PUBLIC_SUPABASE_URL = "https://duzyjhcbrnjnwutoqdjt.supabase.co"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
